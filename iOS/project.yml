name: Shingletrack
options:
  bundleIdPrefix: com.shimondeitel.shingletrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Shingletrack:
    type: application
    platform: iOS
    sources:
      - path: Shingletrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.shingletrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Shingletrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ShingletrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShingletrackTests
      - path: Shingletrack.storekit
    dependencies:
      - target: Shingletrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.shingletrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ShingletrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ShingletrackUITests
    dependencies:
      - target: Shingletrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.shingletrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Shingletrack:
    build:
      targets:
        Shingletrack: all
        ShingletrackTests: [test]
        ShingletrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Shingletrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Shingletrack.storekit
      targets:
        - ShingletrackTests
        - ShingletrackUITests
    archive:
      config: Release
